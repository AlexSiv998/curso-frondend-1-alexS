<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tailwind</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
</head>
<body class="bg-black text-white">
    <nav class="flex justify-between items-center py-6 px-12">
      <div class="flex items-center gap-4">
        <img
          src="https://starlink.com/assets/images/logo_white.png"
          alt="Starlink Logo"
          class="w-[120px] mr-12 cursor-pointer"
        />
        <p
          class="hidden md:block cursor-pointer hover:font-bold transition-all duration-200"
        >
          RESIDENCIAL
        </p>
        <p
          class="hidden md:block cursor-pointer hover:font-bold transition-all duration-200"
        >
          ITINERANTE
        </p>
      </div>
      <div class="flex items-center gap-4">
        <p
          class="hidden md:block cursor-pointer hover:font-bold transition-all duration-200"
        >
          PERSONAL
        </p>
        <p class="hidden md:block">|</p>
        <p
          class="hidden md:block cursor-pointer hover:font-bold transition-all duration-200"
        >
          EMPRESAS
        </p>
        <i class="fa-solid fa-bars cursor-pointer"></i>
      </div>
    </nav>
    <div class="absolute top-0 right-0 w-full min-h-[80vh] -z-5 bg-gradient-to-b from-transparent from- via-transparent via- to-black to-100%"></div>
    <div class="bg-[url('https://starlink.com/public-files/home_b_hero_d.webp')] absolute top-0 right-0 w-full min-h-[80vh] object-cover -z-10 bg-right"></div>
    <div class="flex flex-col justify-center items-center gap-4">
      <h1 class="text-6xl font-semibold">INTERNET DE ALTA VELOCIDAD</h1>
      <h2 class="text-6xl font-semibold">ESTABLE</h2>
      <h2 class="text-6xl font-semibold">DESDE EL ESPACIO</h2>
      <div class="font-normal text-2xl text-center">
        <p>Conectese en casa o en cualquier</p>
        <p>Consulte las <span class="font-black">velocidades</span> en su pais</p>
      </div>
    </div>
  </body>
</html>

</html>
